# Build the Windows apps and attach them to the GitHub release.
#
# The in-app updater downloads "BubblR-Trainer-win.zip" from the latest release
# (see UPDATE_ASSET in bubblr_trainer_app.py), so the asset NAMES here must stay
# exactly as they are — renaming one silently breaks auto-update for everyone.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # lets you build without tagging, to test the build

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write       # needed to upload the release assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build both apps
        run: |
          python -m PyInstaller BubblR-Trainer.spec --noconfirm --clean
          python -m PyInstaller BubblR-Model-Trainer.spec --noconfirm --clean

      - name: Zip the builds
        run: |
          Compress-Archive -Path dist/BubblR-Trainer/*       -DestinationPath BubblR-Trainer-win.zip
          Compress-Archive -Path dist/BubblR-Model-Trainer/* -DestinationPath BubblR-Model-Trainer-win.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bubblr-windows
          path: "*-win.zip"

      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BubblR-Trainer-win.zip
            BubblR-Model-Trainer-win.zip
